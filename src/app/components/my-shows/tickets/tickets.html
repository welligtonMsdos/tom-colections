<div class="container-fluid p-4">

  @if (concertService.loading()) {
    <div class="text-center my-3">
      <div class="spinner-border text-primary" role="status"></div>
      <p>Loading...</p>
    </div>
  }

  <div class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4">
    @for (concert of concertService.ticketList(); track concert.guid) {

      <div class="col">

        <div class="card cardTicket h-100 border-0 shadow-sm position-relative overflow-visible">

          <div class="d-flex justify-content-end gap-1 p-2">

            <button (click)="editConcert(concert.guid)"
                    class="btn btn-sm btn-light text-primary rounded-circle">
              <i class="pi pi-pen-to-square"></i>
            </button>

            <button (click)="showModalDelete.set(true); idSelected.set(concert.guid)"
                    class="btn btn-sm btn-light text-danger rounded-circle">
              <i class="pi pi-trash"></i>
            </button>

          </div>

          <div class="px-3 text-center">
            <img [src]="concert.photo"
                 class="rounded object-fit-cover shadow-sm ticketPhoto"
                 alt="Artist">
          </div>

          <div class="card-body text-center text-secondary">

            <h5 class="fw-bold text-truncate mt-1 mb-0">{{ concert.artist }}</h5>

            <div class="badge bg-secondary mt-2">{{ concert.showDateDescription }}</div>

          </div>

          <div class="card-footer ticketFooter border-0 p-3 mt-2 text-center position-relative">

            <div class="d-flex align-items-center justify-content-center text-secondary">
              <i class="pi pi-map-marker me-2 text-secondary"></i>
              <span class="fw-medium small text-truncate">{{ concert.venue }}</span>
            </div>

          </div>

        </div>
      </div>
    }
  </div>
</div>

@if(showModalUpdate()) {
  <app-concert-update
   [concert]="concertSelected()!"
   (saved)="concertService.get()"
   (close)="showModalUpdate.set(false)" />
}

@if (showModalDelete()) {
  <app-delete-data
   [id]="idSelected()"
   (onCancel)="showModalDelete.set(false)"
   (onConfirm)="delete()" />
}
