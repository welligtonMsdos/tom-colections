<div class="row g-3 mb-3 p-3 mt-3">

  <div class="col-md-12">  

    <div class="d-flex align-items-center justify-content-between gap-2">     

      <div class="ms-auto">
        <button class="btn btn-primary"
                (click)="showModalCreate.set(true)">
          <i class="pi pi-plus me-2"></i>
          New Vinyl
        </button>

      </div>

    </div>

  </div>

</div>

@if (showModalCreate()) {

  <app-vinyl-create (close)="showModalCreate.set(false)" />

}
