<div class="container">

  <div class="row">

    <div class="col-12 mt-5">

      <div class="card shadow-lg">

        <div class="card-body">

          @if (loginService.currentUser(); as user) {

            @if(user.email) {

              <header>
                <h5>Hello, {{ user.name }}!</h5>
                <p>Logged in with email: <strong>{{ user.email }}</strong></p>
              </header>

              <main>
                <p>Exclusive content from your account.</p>
              </main>

            }

          } @else {

             <div class="alert text-warning alert-warning border-warning border-2 mb-2 p-2 shadow-sm" role="alert">

            <div class="flex items-center">

              <i class="pi pi-exclamation-triangle me-2"></i>

              <span class="text-xs font-bold uppercase">Please sign in to access additional features.</span>

            </div>


          </div>


          }

        </div>

      </div>

    </div>

  </div>

</div>
